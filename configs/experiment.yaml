schema_version: 2

experiment:
  id: EXP-007B
  run_id: exp007b_causal_selective_risk_confirmation
  name: Causal selective physics-risk confirmation
  goal: >-
    Confirm whether a prefix-local abstaining controller can preserve useful physics-informed
    RUL improvement while limiting negative transfer on a newly generated sealed simulator
    population.
  evidence: >-
    EXP-007A was a valid negative AUROC/tail gate and its complete-trajectory mean selector was
    not available causally at early prediction times. Nested development-only diagnostics found
    that prefix-local logistic selection with a fixed 0.50 blend improved macro-run RMSE by
    1.7659% while meeting the preregistered development risk constraints.
  hypothesis: >-
    On fresh seed-920072 trajectories, the frozen causal controller will improve macro-run RMSE
    by at least 1% relative to identical data-only parents, with mean positive regret <= 0.005,
    harmful-run fraction <= 0.10, and maximum run regret <= 0.05.
  execution: google_colab_t4
  neural_training: true
  protocol: research/EXP007B_PROTOCOL.md
  protocol_version: 0.3.0
  method_scope: confirmatory_causal_selective_physics_risk_control

repository:
  expected_commit: null
  require_clean_git: true

data:
  dataset_id: exp007b_multicondition_synthetic
  feature_cache: data/processed_features/publication/exp007b/multicondition_features.csv
  metadata_file: data/processed_features/publication/exp007b/multicondition_metadata.json
  expected_feature_cache_sha256: 4f710c4715caa3bd63f6b9e92c21ac97475492092ef892cc6fd55e2737b0a553
  expected_metadata_sha256: d725368d7515ebf91e87bc11d738ece490027afb3db0fe8d83638d09ec7275d3
  scenario_file: configs/exp007b_multicondition_scenarios.csv
  expected_scenario_sha256: 808c036fa9e5b9609f8e868bce9f6d68890c26b025d1c08f7fb4cfa7c4b71522
  split_file: configs/exp007b_data_split.json
  target: normalized_rul
  target_test_access: evaluation_only_after_development_gate
  representation: causal_feature_sequence
  sequence_length: 5
  sequence_stride: 1
  feature_columns:
    - rms
    - std
    - ptp
    - kurtosis
    - crest_factor
    - mean_abs
    - skewness
    - spectral_centroid
    - spectral_bandwidth
    - spectral_entropy
    - high_frequency_ratio
    - load_n
    - speed_rpm
    - snr_db
  signal_feature_columns:
    - rms
    - std
    - ptp
    - kurtosis
    - crest_factor
    - mean_abs
    - skewness
    - spectral_centroid
    - spectral_bandwidth
    - spectral_entropy
    - high_frequency_ratio
  operating_condition_columns: [load_n, speed_rpm, snr_db]
  condition_scaling:
    policy: fixed_declared_physical_ranges_not_fitted_standard_deviations
    load_n: {reference: 5000.0, range: 2400.0}
    speed_rpm: {reference: 3060.0, range: 1080.0}
    snr_db: {reference: 10.0, range: 8.0}
  short_trajectory_policy: fail_if_shorter_than_sequence

simulation:
  source: Bearing_Simulation_Model-main/Bearing_Simulation_Model-main/Simulation_Model.zip
  source_license: CC BY 4.0
  source_citation: >-
    Mauthe, Hagmeyer, and Zeiler (2025),
    DOI 10.3850/978-981-94-3281-3_ESREL-SRA-E2025-P8028-cd
  expected_trajectories: {train: 64, validation: 16, test: 16}
  progression_families:
    - linear_increasing
    - progressively_increasing
    - step_like
    - gamma
  development_seed: 420071
  sealed_test_seed: 920072
  preregistration_commit: b8e4b1e18845e7056fd70c6956426483360975f3
  opened_exp007a_test_seed_excluded: 920071
  test_seal: do_not_evaluate_until_development_target_and_selector_qualification_pass

cross_fit:
  policy: >-
    Every training trajectory is an out-of-fold counterfactual target exactly once. A fold's
    scaler, data-only parent, templates, proxy, and physics interventions do not fit its
    holdout trajectories.
  folds:
    - fold_id: cf_01
      holdout_replicates: [1, 2, 3, 4]
      validation_replicate: 5
    - fold_id: cf_02
      holdout_replicates: [5, 6, 7, 8]
      validation_replicate: 9
    - fold_id: cf_03
      holdout_replicates: [9, 10, 11, 12]
      validation_replicate: 13
    - fold_id: cf_04
      holdout_replicates: [13, 14, 15, 16]
      validation_replicate: 1

backbone:
  name: causal_lstm
  role: identical_parent_and_fallback
  hidden_dim: 64
  epochs: 140
  patience: 20
  batch_size: 128
  learning_rate: 0.0005
  weight_decay: 0.00001
  gradient_clip: 5.0
  minimum_improvement: 0.000001
  mixed_precision: false

physics_intervention:
  interpretation: actual_training_loss_with_adapted_simulator_progression_prior
  candidate_families:
    - linear_increasing
    - progressively_increasing
    - step_like
    - gamma
  time_scale_factors: [0.60, 1.00, 1.60]
  candidate_count: 12
  initialization: clone_identical_best_data_only_checkpoint
  fine_tune_epochs: 40
  patience: 8
  learning_rate: 0.0002
  weights:
    data: 1.0
    prior_value: 0.75
    prior_rate: 0.15
    monotonic: 0.02
  template:
    source: training_only_hidden_simulator_degradation
    grid_points: 101
    gaussian_bandwidth: 0.08
    minimum_standard_deviation: 0.02
    monotonic_projection: cumulative_maximum
  exposure:
    reference_load_n: 5000.0
    reference_speed_rpm: 3060.0
    bearing_life_exponent: 3.3333333333333335
    reference_life_source: median_complete_training_duration_only
    test_total_life_forbidden: true
  attribution: >-
    Adapted controlled-simulator progression regularization. It is not Paris crack growth,
    ISO 281 individual-life truth, or the simulator's undisclosed governing equation.

degradation_proxy:
  model: extra_trees_regressor
  estimators: 128
  max_depth: 12
  min_samples_leaf: 4
  target: degradation_value
  uncertainty: standard_deviation_across_trees

counterfactual_target:
  unit: complete_trajectory_candidate_seed
  metric: normalized_rul_rmse
  regret_definition: physics_rmse_minus_identical_data_only_rmse
  harmful_regret_margin: 0.01
  label: safe_to_apply
  safe_value: 1
  harmful_value: 0
  law_correctness_role: secondary_explanatory_metadata_only
  minimum_development_harmful_fraction: 0.20
  minimum_development_safe_fraction: 0.20

credibility:
  estimator: standardized_logistic_regression
  decision_level: causal_prefix
  class_weight: balanced
  regularization_c: 1.0
  calibration: none
  threshold_selection: validation_constrained_risk_coverage
  fit_checkpoints_per_trajectory_candidate: 12
  candidate_selection: single_highest_probability
  maximum_physics_blend: 0.50
  risk_constraints:
    harm_regret_margin: 0.01
    maximum_mean_positive_regret: 0.005
    maximum_harmful_run_fraction: 0.10
    minimum_intervention_coverage: 0.05
    maximum_intervention_coverage: 0.90
  freeze_before_test: true
  numeric_evidence:
    - prior_absolute_disagreement
    - prior_rate_disagreement
    - rolling_prior_disagreement
    - rolling_rate_disagreement
    - proxy_absolute_residual
    - proxy_uncertainty
    - template_uncertainty
    - residual_relative_to_best
    - residual_rank_fraction
    - load_delta_scaled
    - speed_delta_scaled
    - snr_delta_scaled
    - condition_distance
    - backbone_damage
    - causal_prefix_length_log
    - time_scale_factor
  categorical_evidence: [candidate_family]
  forbidden_inputs:
    - target_rul
    - rul_norm
    - rul_minutes
    - degradation_value
    - true_family
    - degradation_family
    - safe_to_apply
    - harmful_intervention
    - physics_regret
    - total_trajectory_length
    - failure_time
    - future_observations
  fallback: exact_data_only_parent

comparators:
  requested:
    - data_only
    - priorcred
    - inverse_residual
    - validation_selected_scalar
    - random_credibility
    - all_on
    - all_off
    - oracle
    - anti_oracle
  attribution:
    learned_hidden_operator: adapted_attnpinn_deephpm_comparator_only
    monotonic: adapted_multisensory_degradation_consistency_constraint
    dynamic_fusion: prior_art_not_claimed_novel

training:
  seeds: [42, 1042, 2042, 3042, 4042]
  deterministic_torch: true
  dataloader_workers: 0
  resume: true
  recovery_granularity: completed_fold_candidate_or_final_candidate
  oom_policy: fail_and_record

evaluation:
  credibility_metrics: [auroc, auprc, brier, ece]
  rul_metrics: [mae, mse, rmse, r2, macro_run_rmse]
  bootstrap_replicates: 2000
  bootstrap_seed: 420072
  bootstrap_unit_order: [trajectory_within_seed, seed]
  calibration_bins: 10
  probability_float_format: '%.17g'
  primary_endpoint: fresh_sealed_test_causal_controller_risk_and_macro_run_rmse
  report_by:
    - seed
    - trajectory
    - true_family
    - candidate_family
    - law_correctness
    - condition_id
    - lifecycle_region

success_criteria:
  minimum_relative_macro_rmse_improvement_percent: 1.0
  maximum_mean_positive_regret: 0.005
  harm_regret_margin: 0.01
  maximum_harmful_run_fraction: 0.10
  maximum_observed_run_regret: 0.05
  minimum_pooled_intervention_coverage: 0.05
  maximum_pooled_intervention_coverage: 0.90
  decision: >-
    Stop physics-controller escalation unless every development threshold qualifies and every
    fresh sealed-test improvement, regret, harm-rate, tail, and coverage gate passes.

runtime:
  require_cuda: true
  required_gpu_name_contains: T4
  train_work_directory: /content/exp007b_work
  drive_output_directory: /content/drive/MyDrive/Upload/experiment_outputs_exp007b

artifacts:
  create_lightweight_bundle: true
  expected:
    - run_manifest.json
    - experiment_config.yaml
    - git_commit.txt
    - environment.txt
    - dataset_summary.json
    - data_split.json
    - development_target_qualification.json
    - credibility_metrics.csv
    - credibility_predictions.csv
    - control_predictions.csv
    - candidate_regret.csv
    - model_comparison.csv
    - physics_regret.csv
    - risk_slice_metrics.csv
    - selected_candidate_frequency.csv
    - training_history.csv
    - statistical_summary.json
    - gate_decision.json
    - serialization_verification.json
    - failure_report.json
    - summary.md
    - codex_results_bundle.zip
