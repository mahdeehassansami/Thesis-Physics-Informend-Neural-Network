schema_version: 1
created_for: EXP-006
principle: >-
  Prior applicability is distinct from loss weight, prediction uncertainty, and residual
  magnitude. Missing measurements produce an unavailable prior, not an invented constant.

priors:
  monotonic_degradation:
    tier: weak_structural
    quantity: normalized damage or RUL trend
    constraint: local damage should not decrease, with a noise-tolerant margin
    required_observations: [causal_health_trajectory]
    units: dimensionless
    applicability:
      supplied_synthetic_v2: supported
      controlled_synthetic: supported
      pronostia: supported
      ims: supported
      kaist_vibration_temperature: supported
    limitations:
      - Local signal recovery and noise can cause legitimate short reversals.
      - Monotonicity is not a crack-growth or rolling-contact law.

  failure_boundary:
    tier: weak_structural
    quantity: RUL at the declared dataset failure endpoint
    constraint: normalized RUL equals zero at the documented terminal sample
    required_observations: [dataset_failure_definition]
    units: dimensionless
    applicability:
      supplied_synthetic_v2: supported
      controlled_synthetic: supported
      pronostia: supported_with_20g_endpoint
      ims: supported_with_observed_test_stop
      kaist_vibration_temperature: supported_with_85c_or_9mps2_stop
    limitations:
      - Endpoints differ across datasets and cannot be pooled as one physical threshold.

  generator_progression:
    tier: strong_known_truth
    quantity: hidden degradation progression generated by the official simulator
    candidate_families: [linear_increasing, progressively_increasing, step_like, gamma]
    required_observations:
      - degradation_family
      - degradation_value
      - degradation_time
      - simulation_parameters
    units:
      degradation_value: simulator_defined_dimensionless
      degradation_time: minutes
    applicability:
      supplied_synthetic_v2: unavailable_labels_intentionally_withheld
      controlled_synthetic: supported
      pronostia: not_observed
      ims: not_observed
      kaist_vibration_temperature: not_observed
    corruptions:
      - wrong_progression_family
      - correct_family_biased_parameters
      - time_scale_bias
      - hidden_state_noise
    limitations:
      - Synthetic truth validates the diagnostic, not real-world bearing mechanics.

  paris_crack_growth:
    tier: conditional_strong
    equation: da/dN = C * (DeltaK)^m
    quantity: stage_II_crack_length_growth_per_cycle
    required_observations:
      - crack_or_defensible_damage_proxy
      - stress_intensity_range_or_validated_mapping
      - cycle_count
      - material_parameter_distribution
    units:
      crack_length: m
      cycle_count: cycles
      stress_intensity_range: MPa*sqrt(m)
    applicability:
      supplied_synthetic_v2: unsupported_as_ground_truth
      controlled_synthetic: unsupported_as_ground_truth
      pronostia: unidentifiable_from_supplied_sensors
      ims: unidentifiable_from_supplied_sensors
      kaist_vibration_temperature: partially_observed_crack_at_terminal_only
    limitations:
      - A Paris-shaped decay of normalized RUL is a surrogate, not direct crack mechanics.
      - Stage-II applicability and DeltaK are not observed in the current real datasets.

  iso281_l10_miner:
    tier: conditional_population
    equations:
      - L10 = (C/P)^p
      - cumulative_damage = sum(n_i/N_i)
    quantity: population rating life and cumulative cycle fraction
    required_observations: [dynamic_load_rating, equivalent_load, life_exponent, speed]
    units:
      dynamic_load_rating: N
      equivalent_load: N
      speed: rpm
    applicability:
      supplied_synthetic_v2: inputs_available_but_not_individual_law_truth
      controlled_synthetic: inputs_available_but_not_individual_law_truth
      pronostia: load_speed_available_capacity_not_verified
      ims: load_speed_available_capacity_not_verified
      kaist_vibration_temperature: combined_axial_radial_load_requires_mapping
    limitations:
      - L10 is a population statistic, not a deterministic trajectory law.
      - PRONOSTIA documentation states theoretical bearing-life calculations do not match its experiments.

  temperature_lubrication:
    tier: conditional_multiphysics
    quantity: viscosity and life modification under measured thermal and lubrication state
    required_observations:
      - bearing_temperature
      - lubricant_identity
      - viscosity_temperature_curve
      - load
      - speed
      - contamination_or_cleanliness
    units:
      temperature: degC
      kinematic_viscosity: cSt
    applicability:
      supplied_synthetic_v2: unavailable
      controlled_synthetic: unavailable_in_official_model
      pronostia: unavailable
      ims: unavailable
      kaist_vibration_temperature: temperature_observed_other_inputs_incomplete
    limitations:
      - Temperature alone does not identify lubricant viscosity or contamination.
      - Fixed assumed lubricant constants cannot be described as measured physics.

availability_policy:
  unavailable_value: 0.0
  missing_required_input_action: mask_prior
  fallback: identical_data_only_backbone_plus_declared_weak_priors
  forbidden_actions:
    - fill_unmeasured_test_physics_from_test_labels
    - infer_failure_time_from_complete_test_trajectory_at_prediction_time
    - optimize_prior_availability_on_test_error
